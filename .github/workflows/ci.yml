name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: GOOS=linux GOARCH=amd64 go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
